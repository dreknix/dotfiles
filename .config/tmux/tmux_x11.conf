# after selection press 'y' to copy the content
# bind-key -N 'Yank in copy mode' -T copy-mode-vi 'y' \
#   send-keys -X copy-pipe-and-cancel 'xclip -i -sel clipboard -filter | xclip -i -sel primary'
bind-key -N 'Yank in copy mode' -T copy-mode-vi 'y' \
  send-keys -X copy-pipe-and-cancel 'dreknix_clipboard.sh'

# after selection press 'Enter' to copy the content
bind-key -N 'Yank in copy mode' -T copy-mode-vi 'Enter' \
  send-keys -X copy-pipe-and-cancel 'dreknix_clipboard.sh'

# selecting with mouse should also copy the content in 'primary' and 'clipboard'
# bind-key -N 'Yank with mouse' -T copy-mode-vi 'MouseDragEnd1Pane' \
#   send-keys -X copy-pipe-and-cancel 'xclip -i -sel clipboard -filter | xclip -i -sel primary'
bind-key -N 'Yank with mouse' -T copy-mode-vi 'MouseDragEnd1Pane' \
  send-keys -X copy-pipe-and-cancel 'dreknix_clipboard.sh'
